name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build cross-platform binaries
        env:
          BAKED_SUPABASE_URL: ${{ secrets.BAKED_SUPABASE_URL }}
          BAKED_SUPABASE_ANON_KEY: ${{ secrets.BAKED_SUPABASE_ANON_KEY }}
        run: make release VERSION=${GITHUB_REF_NAME}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/myapp-linux-amd64
            dist/myapp-linux-arm64
            dist/myapp-darwin-amd64
            dist/myapp-darwin-arm64
            dist/SHA256SUMS
          generate_release_notes: true
